<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Remote Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header style="background-color: #2c3e50;">
        <h1>Data Analytics</h1>
        <p style="color: #3498db;">System Overview and Trends</p>
        
        <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
            <a href="{{ url_for('main.index') }}" class="apply-btn" style="background-color: #34495e;">💼 View Jobs</a>
            <a href="{{ url_for('main.scholarships_page') }}" class="apply-btn" style="background-color: #8e44ad;">🎓 View Scholarships</a>
        </div>
    </header>

    <main>
        <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div style="background: white; padding: 20px; border-radius: 8px; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid #3498db;">
                <h3 style="color: #7f8c8d; margin-bottom: 10px;">Total Jobs Tracked</h3>
                <h2 style="font-size: 2.5rem; color: #2c3e50;">{{ total_jobs }}</h2>
            </div>
            <div style="background: white; padding: 20px; border-radius: 8px; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid #8e44ad;">
                <h3 style="color: #7f8c8d; margin-bottom: 10px;">Total Scholarships</h3>
                <h2 style="font-size: 2.5rem; color: #2c3e50;">{{ total_scholarships }}</h2>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <h3 style="text-align: center; margin-bottom: 15px;">Jobs by Category</h3>
                <canvas id="categoryChart"></canvas>
            </div>
            
            <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <h3 style="text-align: center; margin-bottom: 15px;">New Jobs (Last 7 Days)</h3>
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Data injected from Python
        const catLabels = JSON.parse('{{ category_labels | safe }}');
        const catData = JSON.parse('{{ category_counts | safe }}');
        const trendLabels = JSON.parse('{{ trend_labels | safe }}');
        const trendData = JSON.parse('{{ trend_counts | safe }}');

        // Render Category Doughnut Chart
        new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: catLabels,
                datasets: [{
                    data: catData,
                    backgroundColor: ['#3498db', '#2ecc71', '#e74c3c', '#f1c40f', '#9b59b6', '#34495e']
                }]
            }
        });

        // Render Trend Bar Chart
        new Chart(document.getElementById('trendChart'), {
            type: 'bar',
            data: {
                labels: trendLabels,
                datasets: [{
                    label: 'Jobs Posted',
                    data: trendData,
                    backgroundColor: '#1abc9c'
                }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });
    </script>
</body>
</html>
